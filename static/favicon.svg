<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SUP Tours">
  <style>
    :root {
      /* Edit these to quickly recolor the icon */
      --bg-1: #2f8fff;
      --bg-2: #0d4fd7;
      --frame: #78a6c0;
      --bg-arc-1: #8ab5cf;
      --bg-arc-2: #3a86ef;
      --bg-arc-3: #1d63dd;
      --s-fill-1: #dcf6ff;
      --s-fill-2: #a9dff2;
      --s-stroke: #003b9f;
      --s-highlight: #ffffff;
    }
  </style>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--bg-1)" />
      <stop offset="100%" stop-color="var(--bg-2)" />
    </linearGradient>
    <linearGradient id="s-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--s-fill-1)" />
      <stop offset="100%" stop-color="var(--s-fill-2)" />
    </linearGradient>
  </defs>

  <rect x="6" y="6" width="244" height="244" rx="36" fill="url(#bg-grad)" stroke="var(--frame)" stroke-width="10" />
  <circle cx="-24" cy="-18" r="156" fill="none" stroke="var(--bg-arc-1)" stroke-width="18" stroke-opacity="0.85" />
  <circle cx="-24" cy="-18" r="131" fill="none" stroke="var(--bg-arc-2)" stroke-width="18" stroke-opacity="0.92" />
  <circle cx="-24" cy="-18" r="106" fill="none" stroke="var(--bg-arc-3)" stroke-width="18" stroke-opacity="0.98" />

  <text
    x="128"
    y="156"
    text-anchor="middle"
    font-size="212"
    font-weight="900"
    font-style="italic"
    dominant-baseline="middle"
    transform="translate(128 156) scale(1.5) translate(-128 -156)"
    font-family="Trebuchet MS, Verdana, Arial Black, sans-serif"
    fill="url(#s-grad)"
    stroke="var(--s-stroke)"
    stroke-width="11"
    paint-order="stroke fill"
  >
    S
  </text>

  <text
    x="128"
    y="156"
    text-anchor="middle"
    font-size="212"
    font-weight="900"
    font-style="italic"
    dominant-baseline="middle"
    transform="translate(128 156) scale(1.5) translate(-128 -156)"
    font-family="Trebuchet MS, Verdana, Arial Black, sans-serif"
    fill="none"
    stroke="var(--s-highlight)"
    stroke-width="4"
    stroke-opacity="0.7"
  >
    S
  </text>
</svg>
